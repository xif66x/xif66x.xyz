name: Repo Auto Update

on:
  push:
    branches:
      - main  # تأكد أن هذا هو اسم الفرع الرئيسي عندك
    paths:
      - 'debs/**' # يشتغل السكريبت عند أي تغيير (إضافة أو حذف) داخل مجلد debs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2

      - name: Update Packages File
        run: |
          # 1. حذف الملفات القديمة لضمان تحديث نظيف
          rm -f Packages Packages.bz2
          
          # 2. إنشاء ملف Packages جديد بناءً على الملفات الموجودة حالياً في debs
          dpkg-scanpackages -m ./debs > Packages
          
          # 3. التأكد من أن الملف ليس فارغاً (يحتوي على أدوات)
          if [ ! -s Packages ]; then
            echo "Warning: No debs found or Packages file is empty."
          fi

          # 4. ضغط الملف بصيغة bzip2 ليتوافق مع السيديا وسيلو
          bzip2 -c Packages > Packages.bz2

      - name: Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # سحب أي تغييرات خارجية لتجنب التعارض
          git pull --rebase origin main
          
          # إضافة الملفات المحدثة
          git add Packages Packages.bz2
          
          # إتمام العملية والرفع
          git commit -m "Update repo index (Add/Remove tools) [skip ci]" || echo "No changes to commit"
          git push origin main
