name: Repo Auto Update

on:
  push:
    branches:
      - main
    paths:
      - 'debs/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2

      - name: Update Packages File
        run: |
          rm -f Packages Packages.bz2
          dpkg-scanpackages -m ./debs > Packages
          bzip2 -c Packages > Packages.bz2

      - name: Force Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Packages Packages.bz2
          git commit -m "Update Repo Index [skip ci]" || echo "No changes"
          
          # هذا السطر هو الحل لخطأ 128: يمسح التعارض ويرفع بالقوة
          git push origin main --force
