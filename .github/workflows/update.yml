name: Repo Auto Update

on:
  push:
    branches:
      - main
    paths:
      - 'debs/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2

      - name: Update Packages File
        run: |
          dpkg-scanpackages -m ./debs > Packages
          # تأكد من تغيير رابط الدومين أدناه
          sed -i '/Filename:/a SileoDepiction: https://xif66x.xyz/global_depiction.json' Packages
          bzip2 -c Packages > Packages.bz2

      - name: Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Packages Packages.bz2
          # حل مشكلة التعارض (الصورة 3): تخزين التعديلات مؤقتاً ثم سحب الجديد ثم استعادتها
          git stash
          git pull --rebase origin main
          git stash pop || echo "No stash to pop"
          git commit -m "Auto-update Packages [skip ci]" || echo "No changes to commit"
          git push origin main
